name: Build and Deploy to Docker Swarm

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Git Secret
        run: |
          sudo apt-get update
          sudo apt-get install -y git-secret

      - name: Import GPG Key for Git Secret
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch --yes
          gpg --list-secret-keys

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests (API 커버리지 + 테스트 통과 검증)
        run: npm test

      - name: Decrypt .env using git-secret
        run: |
          git secret reveal -p "${{ secrets.GPG_PASSPHRASE }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build Docker Image with .env
        run: |
          docker buildx build -t ${{ secrets.DOCKER_HUB_USERNAME }}/attendance:prod --platform linux/amd64 .

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/attendance:prod

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AWS_SSH_BACKEND_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Docker Swarm on AWS EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_SSH_BACKEND_HOST }} << 'EOF'
            cd ~/src/deployment/ec2-deploy/backend
            docker compose pull attendance
            docker compose up -d attendance
            docker image prune -f
          EOF
